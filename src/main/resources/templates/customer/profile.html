<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Profile - FU Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">FU Car Rental</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/customer/rent}">Rent a Car</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/customer/history}">My Rentals</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div th:if="${param.updated}" class="alert alert-success">Profile updated successfully!</div>

        <div class="card">
            <div class="card-header">
                <h4>My Profile</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/customer/profile/update}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="customerName" class="form-control" th:value="${customer.customerName}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Mobile</label>
                            <input type="text" name="mobile" class="form-control" th:value="${customer.mobile}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:value="${customer.email}" readonly disabled>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Identity Card</label>
                            <input type="text" class="form-control" th:value="${customer.identityCard}" readonly disabled>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Birthday</label>
                            <input type="date" class="form-control" th:value="${customer.birthday}" readonly disabled>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Licence Number</label>
                            <input type="text" class="form-control" th:value="${customer.licenceNumber}" readonly disabled>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Update Profile</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
