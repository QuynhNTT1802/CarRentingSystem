<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rent a Car - FU Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">FU Car Rental</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/customer/history}">My Rentals</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/customer/profile}">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>Rent a Car</h3>
        <div class="card mt-3">
            <div class="card-body">
                <form th:action="@{/customer/rent}" method="post">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Pickup Date</label>
                            <input type="date" name="pickupDate" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Return Date</label>
                            <input type="date" name="returnDate" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Rent Price</label>
                            <input type="number" step="0.01" name="rentPrice" class="form-control" placeholder="Total price" required>
                        </div>
                    </div>
                    <h5 class="mt-3">Select Cars</h5>
                    <div class="table-responsive">
                        <table class="table table-bordered">
                            <thead class="table-dark">
                                <tr>
                                    <th style="width:40px">Select</th>
                                    <th>Name</th>
                                    <th>Model Year</th>
                                    <th>Color</th>
                                    <th>Capacity</th>
                                    <th>Producer</th>
                                    <th>Price/Day</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="car : ${cars}">
                                    <td class="text-center">
                                        <input type="checkbox" name="carIds" th:value="${car.carID}" class="form-check-input">
                                    </td>
                                    <td th:text="${car.carName}"></td>
                                    <td th:text="${car.carModelYear}"></td>
                                    <td th:text="${car.color}"></td>
                                    <td th:text="${car.capacity}"></td>
                                    <td th:text="${car.producer.producerName}"></td>
                                    <td th:text="${car.rentPrice}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Rental</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
