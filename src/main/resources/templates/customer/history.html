<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Rental History - FU Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">FU Car Rental</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/customer/rent}">Rent a Car</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/customer/profile}">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div th:if="${param.success}" class="alert alert-success">Rental created successfully!</div>
        <h3>My Rental History</h3>
        <div class="table-responsive mt-3">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Car</th>
                        <th>Pickup Date</th>
                        <th>Return Date</th>
                        <th>Rent Price</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r, iter : ${rentals}">
                        <td th:text="${iter.count}"></td>
                        <td th:text="${r.car.carName} + ' (' + ${r.car.color} + ', ' + ${r.car.carModelYear} + ')'"></td>
                        <td th:text="${r.pickupDate}"></td>
                        <td th:text="${r.returnDate}"></td>
                        <td th:text="${r.rentPrice}"></td>
                        <td><span class="badge bg-info" th:text="${r.status}"></span></td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${rentals.isEmpty()}" class="alert alert-info">
                You have no rental transactions yet.
                <a th:href="@{/customer/rent}">Rent a car now</a>
            </div>
        </div>
    </div>
</body>
</html>
