<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard - FU Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">FU Car Rental - Admin</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/customers}">Customers</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/cars}">Cars</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/rentals}">Rentals</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/report}">Report</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Admin Dashboard</h2>
        <p class="text-muted">Welcome to the administration panel</p>
        <div class="row mt-4">
            <div class="col-md-3 mb-3">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h5 class="card-title">Customers</h5>
                        <a th:href="@{/admin/customers}" class="text-white">Manage &raquo;</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5 class="card-title">Cars</h5>
                        <a th:href="@{/admin/cars}" class="text-white">Manage &raquo;</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <h5 class="card-title">Rentals</h5>
                        <a th:href="@{/admin/rentals}" class="text-white">Manage &raquo;</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-info text-white">
                    <div class="card-body">
                        <h5 class="card-title">Reports</h5>
                        <a th:href="@{/admin/report}" class="text-white">Generate &raquo;</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
