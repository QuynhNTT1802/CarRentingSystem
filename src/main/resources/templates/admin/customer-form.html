<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer Form - FU Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">FU Car Rental - Admin</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/customers}">Back</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h4 th:text="${customer.customerID == null} ? 'Add Customer' : 'Edit Customer'"></h4>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/customers/save}" method="post">
                    <input type="hidden" name="customerID" th:value="${customer.customerID}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="customerName" class="form-control" th:value="${customer.customerName}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Mobile</label>
                            <input type="text" name="mobile" class="form-control" th:value="${customer.mobile}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" th:value="${customer.email}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Password
                                <span th:if="${customer.customerID != null}" class="text-muted small">(leave blank to keep current)</span>
                            </label>
                            <input type="password" name="password" class="form-control" th:required="${customer.customerID == null}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Birthday</label>
                            <input type="date" name="birthday" class="form-control" th:value="${customer.birthday}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Identity Card</label>
                            <input type="text" name="identityCard" class="form-control" th:value="${customer.identityCard}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Licence Number</label>
                            <input type="text" name="licenceNumber" class="form-control" th:value="${customer.licenceNumber}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Licence Date</label>
                            <input type="date" name="licenceDate" class="form-control" th:value="${customer.licenceDate}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select" required>
                            <option value="CUSTOMER" th:selected="${currentRole == 'CUSTOMER'}">Customer</option>
                            <option value="ADMIN" th:selected="${currentRole == 'ADMIN'}">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/admin/customers}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
