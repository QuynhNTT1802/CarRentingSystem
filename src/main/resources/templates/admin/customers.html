<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Customers - FU Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">FU Car Rental - Admin</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/cars}">Cars</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/rentals}">Rentals</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/report}">Report</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Customer Management</h3>
            <a th:href="@{/admin/customers/add}" class="btn btn-primary">+ Add Customer</a>
        </div>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Identity Card</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${customers}">
                        <td th:text="${c.customerID}"></td>
                        <td th:text="${c.customerName}"></td>
                        <td th:text="${c.email}"></td>
                        <td th:text="${c.mobile}"></td>
                        <td th:text="${c.identityCard}"></td>
                        <td><span class="badge bg-secondary" th:text="${c.account.role}"></span></td>
                        <td>
                            <a th:href="@{/admin/customers/edit/{id}(id=${c.customerID})}" class="btn btn-sm btn-warning">Edit</a>
                            <a th:href="@{/admin/customers/delete/{id}(id=${c.customerID})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this customer?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
