<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Rentals - FU Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">FU Car Rental - Admin</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/customers}">Customers</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/cars}">Cars</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/report}">Report</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>Rental Management</h3>
        <div class="table-responsive mt-3">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Customer</th>
                        <th>Car</th>
                        <th>Pickup Date</th>
                        <th>Return Date</th>
                        <th>Rent Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${rentals}">
                        <td th:text="${r.customer.customerName}"></td>
                        <td th:text="${r.car.carName}"></td>
                        <td th:text="${r.pickupDate}"></td>
                        <td th:text="${r.returnDate}"></td>
                        <td th:text="${r.rentPrice}"></td>
                        <td><span class="badge bg-info" th:text="${r.status}"></span></td>
                        <td>
                            <form th:action="@{/admin/rentals/delete}" method="post" style="display:inline">
                                <input type="hidden" name="customerId" th:value="${r.customer.customerID}">
                                <input type="hidden" name="carId" th:value="${r.car.carID}">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this rental?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
