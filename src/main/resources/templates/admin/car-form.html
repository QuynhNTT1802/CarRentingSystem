<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Car Form - FU Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">FU Car Rental - Admin</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/cars}">Back</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h4 th:text="${car.carID == null} ? 'Add Car' : 'Edit Car'"></h4>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/cars/save}" method="post">
                    <input type="hidden" name="carID" th:value="${car.carID}">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Car Name</label>
                            <input type="text" name="carName" class="form-control" th:value="${car.carName}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Model Year</label>
                            <input type="number" name="carModelYear" class="form-control" th:value="${car.carModelYear}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Color</label>
                            <input type="text" name="color" class="form-control" th:value="${car.color}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Capacity</label>
                            <input type="number" name="capacity" class="form-control" th:value="${car.capacity}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="2" required th:text="${car.description}"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Import Date</label>
                            <input type="date" name="importDate" class="form-control" th:value="${car.importDate}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Producer</label>
                            <select name="producerId" class="form-select" required>
                                <option th:each="p : ${producers}" th:value="${p.producerID}"
                                        th:text="${p.producerName}"
                                        th:selected="${car.producer != null and car.producer.producerID == p.producerID}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Rent Price</label>
                            <input type="number" step="0.01" name="rentPrice" class="form-control" th:value="${car.rentPrice}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select" required>
                                <option value="Active" th:selected="${car.status == 'Active'}">Active</option>
                                <option value="Inactive" th:selected="${car.status == 'Inactive'}">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/admin/cars}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
