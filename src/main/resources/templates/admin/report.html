<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rental Report - FU Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">FU Car Rental - Admin</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/customers}">Customers</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/cars}">Cars</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/rentals}">Rentals</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>Rental Report</h3>
        <div class="card mt-3">
            <div class="card-body">
                <form th:action="@{/admin/report}" method="post" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Start Date</label>
                        <input type="date" name="startDate" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">End Date</label>
                        <input type="date" name="endDate" class="form-control" required>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Generate Report</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${rentals != null and !rentals.isEmpty()}" class="mt-4">
            <h5>
                Report from <span class="text-primary" th:text="${startDate}"></span>
                to <span class="text-primary" th:text="${endDate}"></span>
                (<span th:text="${rentals.size()}"></span> transactions)
            </h5>
            <div class="table-responsive">
                <table class="table table-bordered table-hover mt-2">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Customer</th>
                            <th>Car</th>
                            <th>Pickup Date</th>
                            <th>Return Date</th>
                            <th>Rent Price</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r, iter : ${rentals}">
                            <td th:text="${iter.count}"></td>
                            <td th:text="${r.customer.customerName}"></td>
                            <td th:text="${r.car.carName} + ' (' + ${r.car.carModelYear} + ')'"></td>
                            <td th:text="${r.pickupDate}"></td>
                            <td th:text="${r.returnDate}"></td>
                            <td th:text="${r.rentPrice}"></td>
                            <td><span class="badge bg-info" th:text="${r.status}"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:if="${rentals != null and rentals.isEmpty()}" class="alert alert-info mt-4">
            No rentals found in this period.
        </div>
    </div>
</body>
</html>
