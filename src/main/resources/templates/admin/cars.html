<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Cars - FU Car Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">FU Car Rental - Admin</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/customers}">Customers</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/rentals}">Rentals</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/report}">Report</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Car Management</h3>
            <a th:href="@{/admin/cars/add}" class="btn btn-primary">+ Add Car</a>
        </div>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Model Year</th>
                        <th>Color</th>
                        <th>Capacity</th>
                        <th>Producer</th>
                        <th>Rent Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="car : ${cars}">
                        <td th:text="${car.carID}"></td>
                        <td th:text="${car.carName}"></td>
                        <td th:text="${car.carModelYear}"></td>
                        <td th:text="${car.color}"></td>
                        <td th:text="${car.capacity}"></td>
                        <td th:text="${car.producer.producerName}"></td>
                        <td th:text="${car.rentPrice}"></td>
                        <td>
                            <span class="badge" th:classappend="${car.status == 'Active'} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${car.status}"></span>
                        </td>
                        <td>
                            <a th:href="@{/admin/cars/edit/{id}(id=${car.carID})}" class="btn btn-sm btn-warning">Edit</a>
                            <a th:href="@{/admin/cars/delete/{id}(id=${car.carID})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this car?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
